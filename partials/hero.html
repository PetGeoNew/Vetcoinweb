<section class="hero" id="hero">
	<div class="hero__inner">
		<span class="hero__badge">Native Token of PetGeo Ecosystem</span>

		<h1 class="hero__title">
			Transform Pet Care with <span class="hero__title-accent">VETcoin</span>
		</h1>

		<p class="hero__subtitle">
			The native BEP-20 token powering PetGeo social network. Earn rewards,
			support shelters, and connect with the global pet community.
		</p>

		<div class="hero__actions">
			<a
				class="hero__buy"
				href="https://pancakeswap.finance/swap?chain=bsc&inputCurrency=BNB&outputCurrency={{CONTRACT_ADDRESS}}"
				target="_blank"
				rel="noopener noreferrer"
			>
				<span class="hero__buy-icon" aria-hidden="true">
					<svg
						xmlns="http://www.w3.org/2000/svg"
						width="22"
						height="22"
						viewBox="0 0 22 22"
						fill="none"
					>
						<path
							d="M14.6703 8.6295L6.78054 16.5193L5.48438 15.2231L13.3732 7.33333H6.42029V5.5H16.5036V15.5833H14.6703V8.6295Z"
							fill="#FF8C00"
						/>
					</svg>
				</span>
				<span class="hero__buy-text">Buy VETcoin</span>
			</a>

			<a class="hero__dex" href="https://dexscreener.com/bsc/{{CONTRACT_ADDRESS}}" target="_blank" rel="noopener">
				<img
					class="hero__dex-logo"
					src="/assets/dex_screener_logo.svg"
					alt=""
					width="26"
					height="31"
					aria-hidden="true"
				/>
				<span class="hero__dex-text">
					<span class="hero__dex-bold">DEX</span>
					<span>SCREENER</span>
				</span>
			</a>
		</div>

		<div class="hero__media">
			<picture>
				<source srcset="/assets/hero.webp" type="image/webp" />
				<img
					src="/assets/hero.png"
					alt="VETcoin — pets of the PetGeo community"
					class="hero__media-image"
					width="1164"
					height="1200"
					fetchpriority="high"
				/>
			</picture>
		</div>
	</div>
</section>
