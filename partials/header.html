<header class="header">
	<a class="header__logo" href="/#hero" aria-label="VETcoin">
		<img
			class="header__logo-icon"
			src="/assets/vetcoin_logo.svg"
			alt=""
			width="24"
			height="24"
		/>

		<span class="header__title">
			VET<span class="header__title-accent">coin</span>
		</span>
	</a>

	<div class="header__actions">
		<a
			class="header__buy"
			href="https://pancakeswap.finance/swap?chain=bsc&inputCurrency=BNB&outputCurrency={{CONTRACT_ADDRESS}}"
			target="_blank"
			rel="noopener noreferrer"
			>Buy VETcoin</a
		>

		<button
			class="header__button"
			type="button"
			aria-label="Open menu"
			aria-expanded="false"
			aria-controls="header-nav"
		>
			<img
				src="/assets/menu_burger.svg"
				alt=""
				width="20"
				height="20"
				aria-hidden="true"
			/>
		</button>
	</div>

	<nav class="header__links" id="header-nav">
		<a class="header__link" href="/#launch">About</a>
		<a class="header__link" href="/#utility">Utility</a>
		<a class="header__link" href="/#tokenomics">Tokenomics</a>
		<a class="header__link" href="/#roadmap">Roadmap</a>
	</nav>
</header>
