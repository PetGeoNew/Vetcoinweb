<section class="crew" id="crew">

		Leading the revolution in blockchain-powered pet care
	</p>

	<div class="crew__cards">

			<picture>

			<div class="crew__overlay" aria-hidden="true"></div>

			<div class="crew__info">

			</picture>
			<div class="crew__overlay" aria-hidden="true"></div>

			<span class="crew__badge">Companion</span>

			<div class="crew__info">
				<p class="crew__name">Rex</p>

		<article class="crew__card">
			<picture>

			<span class="crew__badge">Companion</span>

			<div class="crew__info">
				<p class="crew__name">Thunder</p>

			</div>

</section>
