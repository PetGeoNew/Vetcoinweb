<section class="launch" id="launch">
	<div class="launch__card">
		<span class="launch__bg" aria-hidden="true"></span>
		<span class="launch__glow" aria-hidden="true"></span>

		<div class="launch__inner">
			<picture>
				<source srcset="/assets/launch.webp" type="image/webp" />
				<img
					class="launch__image"
					src="/assets/launch.png"
					alt="VETcoin mascots"
					width="302"
					height="123"
					loading="lazy"
				/>
			</picture>

			<div class="launch__content">
				<div class="launch__text">
					<h2 class="launch__title">100% Fair Launch</h2>

					<p class="launch__subtitle">
						No presale. No seed round. No private sales. Just a fair,
						transparent launch for everyone.
					</p>
				</div>

				<ul class="launch__badges">
					<li class="launch__badge">
						<span class="launch__badge-check" aria-hidden="true">✓</span>
						Community First
					</li>
					<li class="launch__badge">
						<span class="launch__badge-check" aria-hidden="true">✓</span>
						Deep Liquidity
					</li>
					<li class="launch__badge">
						<span class="launch__badge-check" aria-hidden="true">✓</span>
						5% Team Allocation
					</li>
					<li class="launch__badge">
						<span class="launch__badge-check" aria-hidden="true">✓</span>
						Verified Contract
					</li>
				</ul>
			</div>
		</div>
	</div>
</section>
